# .github/workflows/owlmind-fix.yml
# Add this to your repo to automatically fix CI failures

name: OwlMind Auto-Fix
on:
  workflow_run:
    workflows: ["CI", "Tests", "Build"]  # Add your CI workflow names
    types: [completed]

jobs:
  auto-fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: owlmind/fix-ci@v1
        id: fix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          owlmind-api-key: ${{ secrets.OWLMIND_API_KEY }}

      - name: Report result
        if: always()
        run: echo "${{ steps.fix.outputs.summary }}"
