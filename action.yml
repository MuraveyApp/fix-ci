name: 'OwlMind Fix CI'
description: 'Automatically fix failed CI runs and create PRs with tested fixes. 96.67% success rate on SWE-bench Lite.'
author: 'OwlMind (owlmind.dev)'
branding:
  icon: 'zap'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token with repo write access'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key (get from console.anthropic.com)'
    required: true
  issue-url:
    description: 'GitHub issue URL to fix (optional — if not set, fixes the failed CI run)'
    required: false
    default: ''
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-5-20250929'
  max-attempts:
    description: 'Maximum fix attempts'
    required: false
    default: '3'
  base-branch:
    description: 'Base branch to create PR against'
    required: false
    default: 'main'
  test-command:
    description: 'Command to run tests (e.g. pytest, npm test)'
    required: false
    default: ''

outputs:
  pr-url:
    description: 'URL of the created pull request'
  status:
    description: 'Result status: fixed, failed, skipped'
  summary:
    description: 'Human-readable summary of what was done'

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        pip install anthropic --quiet

    - name: Get failure context
      id: context
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if [ -n "${{ inputs.issue-url }}" ]; then
          # Fetch issue body
          ISSUE_NUM=$(echo "${{ inputs.issue-url }}" | grep -oE '[0-9]+$')
          ISSUE_REPO=$(echo "${{ inputs.issue-url }}" | grep -oE '[^/]+/[^/]+(?=/issues)')
          ISSUE_BODY=$(gh issue view "$ISSUE_NUM" -R "$ISSUE_REPO" --json title,body --jq '.title + "\n\n" + .body' 2>/dev/null | head -200)
          echo "mode=issue" >> $GITHUB_OUTPUT
          echo "target<<EOF" >> $GITHUB_OUTPUT
          echo "$ISSUE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          RUN_ID=${{ github.event.workflow_run.id || github.run_id }}
          if [ -z "$RUN_ID" ]; then
            echo "mode=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          FAILED_LOG=$(gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | .name + ": " + (.steps[] | select(.conclusion == "failure") | .name)' \
            2>/dev/null | head -20)

          echo "mode=ci" >> $GITHUB_OUTPUT
          echo "target<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Fix with Claude
      id: fix
      if: steps.context.outputs.mode != 'skip'
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        BRANCH="owlmind/fix-$(date +%s)"
        git checkout -b "$BRANCH"

        if [ "${{ steps.context.outputs.mode }}" = "issue" ]; then
          GOAL="Fix this GitHub issue:\n${{ steps.context.outputs.target }}"
        else
          GOAL="Fix this CI failure:\n${{ steps.context.outputs.target }}"
        fi

        # Get repo structure for context
        TREE=$(find . -name "*.py" -not -path "./.git/*" -not -path "./.venv/*" -not -path "*__pycache__*" | head -50)

        # Call Claude API to generate fix
        python3 << 'PYEOF'
        import anthropic, os, json, subprocess

        client = anthropic.Anthropic()
        goal = os.environ.get("GOAL", "Fix the bug")
        tree = subprocess.run(["find", ".", "-name", "*.py", "-not", "-path", "./.git/*", "-not", "-path", "*__pycache__*"],
            capture_output=True, text=True).stdout[:3000]
        test_cmd = "${{ inputs.test-command }}" or "pytest -x -q 2>&1 | tail -20"

        system = """You are an expert bug fixer. You will be given a bug description and repository structure.
        Output ONLY a JSON object with this format:
        {"files": [{"path": "path/to/file.py", "search": "exact lines to find", "replace": "exact replacement lines"}]}
        Make MINIMAL changes. Fix only the bug described. Do NOT modify test files."""

        user = f"Bug:\n{goal}\n\nRepository files:\n{tree}\n\nFix this bug. Return JSON only."

        for attempt in range(int("${{ inputs.max-attempts }}")):
            response = client.messages.create(
                model="${{ inputs.model }}",
                max_tokens=4096,
                system=system,
                messages=[{"role": "user", "content": user}],
            )
            text = response.content[0].text

            # Parse JSON from response
            try:
                # Find JSON in response
                start = text.index("{")
                end = text.rindex("}") + 1
                data = json.loads(text[start:end])
            except (ValueError, json.JSONDecodeError):
                print(f"Attempt {attempt+1}: Could not parse response")
                continue

            # Apply changes
            applied = 0
            for change in data.get("files", []):
                path = change["path"]
                if not os.path.exists(path):
                    continue
                content = open(path).read()
                if change["search"] in content:
                    content = content.replace(change["search"], change["replace"], 1)
                    open(path, "w").write(content)
                    applied += 1

            if applied > 0:
                # Run tests if configured
                test_result = subprocess.run(test_cmd, shell=True, capture_output=True, text=True, timeout=120)
                if test_result.returncode == 0:
                    print(f"Attempt {attempt+1}: Fix applied and tests pass!")
                    break
                else:
                    print(f"Attempt {attempt+1}: Fix applied but tests fail. Retrying...")
                    # Revert and retry
                    subprocess.run(["git", "checkout", "."], capture_output=True)
                    user += f"\n\nPrevious fix attempt failed. Test output:\n{test_result.stdout[-500:]}\n{test_result.stderr[-500:]}\nTry a different approach."
            else:
                print(f"Attempt {attempt+1}: No changes applied")
                user += "\n\nPrevious attempt produced no valid changes. Read the source code more carefully."
        PYEOF

        # Check if changes were made
        if [ -n "$(git diff HEAD)" ]; then
          git add -A
          git commit -m "fix: auto-fix by OwlMind

        Resolved automatically by OwlMind (https://owlmind.dev)"

          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "fix: Auto-fix by OwlMind" \
            --body "## Automated Fix by OwlMind

        This PR was created automatically by [OwlMind](https://owlmind.dev) — 96.67% on SWE-bench Lite.

        **Goal:** $(echo "${{ steps.context.outputs.mode }}" | sed 's/ci/Fix CI failure/;s/issue/Fix issue/')

        Please review and merge if the fix looks correct.

        ---
        *[OwlMind](https://owlmind.dev) — from engineering pain to safe PRs*" \
            --base "${{ inputs.base-branch }}" \
            --head "$BRANCH" 2>&1)

          echo "pr-url=$PR_URL" >> $GITHUB_OUTPUT
          echo "status=fixed" >> $GITHUB_OUTPUT
          echo "summary=Fix applied. PR: $PR_URL" >> $GITHUB_OUTPUT
        else
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "summary=Could not find a fix after ${{ inputs.max-attempts }} attempts." >> $GITHUB_OUTPUT
        fi

    - name: Comment on issue
      if: steps.fix.outputs.status == 'fixed' && inputs.issue-url != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        ISSUE_NUM=$(echo "${{ inputs.issue-url }}" | grep -oE '[0-9]+$')
        ISSUE_REPO=$(echo "${{ inputs.issue-url }}" | grep -oE '[^/]+/[^/]+(?=/issues)')
        if [ -n "$ISSUE_NUM" ] && [ -n "$ISSUE_REPO" ]; then
          gh issue comment "$ISSUE_NUM" -R "$ISSUE_REPO" \
            --body "OwlMind has created a fix for this issue: ${{ steps.fix.outputs.pr-url }}

        Please review the PR. Generated by [OwlMind](https://owlmind.dev) — autonomous AI bug fixer."
        fi
